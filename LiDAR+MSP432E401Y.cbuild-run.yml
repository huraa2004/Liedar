            __var isMSP432E411Y = 0;
            __var isMSP432E4 = 0;
            DID0 = Read32(0x400FE000);
            DID1 = Read32(0x400FE004);
            isMSP432E401Y = 
            (DID0 == 0x180C0002) &&
            (DID1 == 0x102DC06E);
            isMSP432E411Y = 
            (DID0 == 0x180C0002) &&
