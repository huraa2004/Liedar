        - while: clockEnabled == 0
          timeout: 50000
          execute: |
            // wait 50 ms to enable clock for GPIO F
            clockEnabled = (Read32(0x400FE608) & 0x20);
        - if: width == 1
          execute: |
            Write32(0x4005D520, 0x4C4F434B);        // Unlock GPIOLOCK F
